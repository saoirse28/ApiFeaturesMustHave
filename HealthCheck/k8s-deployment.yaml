livenessProbe:
  httpGet:
    path: /health/live
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 2

startupProbe:
  httpGet:
    path: /health/live
    port: 8080
  initialDelaySeconds: 5
  failureThreshold: 30
  periodSeconds: 5